name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - 'feature/**'
      - 'fix/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Lint, Test & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests

  android-compile:
    name: Android Compile Check
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android debug keystore
        run: bash scripts/ci/ensure-android-keystore.sh

      - name: Compile Android debug build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
