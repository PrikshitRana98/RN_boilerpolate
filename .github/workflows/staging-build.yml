name: Staging Build

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  IOS_SCHEME: rn_boilerplate
  IOS_WORKSPACE: ios/rn_boilerplate.xcworkspace
  SLACK_CHANNEL_ID: C0BCTR34Z89

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests

  android:
    name: Android Release APK
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Ensure Android debug keystore
        run: bash scripts/ci/ensure-android-keystore.sh

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-staging-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  ios:
    name: iOS Simulator Build
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: '2.5.23'
          bundler-cache: true

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          bundle exec pod install --repo-update

      - name: Build iOS (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ env.IOS_WORKSPACE }}" \
            -scheme "${{ env.IOS_SCHEME }}" \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package iOS app
        run: |
          APP_PATH=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "iOS .app not found"
            exit 1
          fi
          mkdir -p ios-artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" ios-artifacts/rn_boilerplate-simulator.zip

      - name: Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: ios-staging-simulator
          path: ios-artifacts/rn_boilerplate-simulator.zip
          retention-days: 14

  ota-bundles:
    name: OTA JS Bundles
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build OTA bundles
        run: |
          npm run bundle:ota:android
          npm run bundle:ota:ios

      - name: Upload OTA bundles
        uses: actions/upload-artifact@v4
        with:
          name: ota-staging-bundles
          path: |
            ota-bundles/android-bundle.zip
            ota-bundles/ios-bundle.zip
          retention-days: 14

  notify:
    name: Notify Team
    needs: [quality, android, ios, ota-bundles]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send build notification
        env:
          PIPELINE_NAME: Staging Build
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ env.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          ANDROID_RESULT: ${{ needs.android.result }}
          IOS_RESULT: ${{ needs.ios.result }}
          OTA_RESULT: ${{ needs.ota-bundles.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: bash scripts/ci/notify.sh
